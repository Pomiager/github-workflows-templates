name: ".NET - Step: Docker Build and Push Image"

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name without registry prefix (e.g.: my-app)"
        type: string
        required: true
      image-tag:
        description: "Docker image tag (e.g.: test-abc1234 or v1.2.3)"
        type: string
        required: true
      registry-url:
        description: "Container registry URL (e.g.: ghcr.io/Pomiager)"
        type: string
        required: true
      dockerfile-path:
        description: "Path to the Dockerfile"
        type: string
        required: false
        default: "./Dockerfile"
      build-context:
        description: "Docker build context path"
        type: string
        required: false
        default: "."
    secrets:
      registry-username:
        required: true
      registry-password:
        required: true
    outputs:
      full-image-tag:
        description: "Full image reference pushed: registry/image:tag"
        value: ${{ jobs.build-push.outputs.full-image-tag }}

jobs:
  build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    outputs:
      full-image-tag: ${{ steps.set-outputs.outputs.full-image-tag }}
    steps:
      - name: Checkout
        # TODO: pin to commit hash
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # TODO: pin to commit hash
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        # TODO: pin to commit hash
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry-url }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      - name: Build and Push
        # TODO: pin to commit hash
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ inputs.registry-url }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set outputs
        id: set-outputs
        run: echo "full-image-tag=${{ inputs.registry-url }}/${{ inputs.image-name }}:${{ inputs.image-tag }}" >> $GITHUB_OUTPUT
